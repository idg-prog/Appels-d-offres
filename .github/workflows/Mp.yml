name: Run Selenium MP Scraper

on:
  workflow_dispatch:
  schedule:
    - cron: '0 5 * * *'

permissions:
  contents: write

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr tesseract-ocr-fra tesseract-ocr-ara \
            libtesseract-dev poppler-utils antiword

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install pandas pymupdf pytesseract pillow python-docx \
            selenium pdf2image webdriver-manager

      - name: Run Scraper
        run: python Mp.py

      - name: Upload CSV Artifact
        uses: actions/upload-artifact@v4
        with:
          name: scraper-results
          path: tender_results_summary.csv

      - name: Commit and Push CSV to repo
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add tender_results_summary.csv
          git diff --staged --quiet || git commit -m "📊 Daily Scrape: $(date +'%Y-%m-%d')"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
