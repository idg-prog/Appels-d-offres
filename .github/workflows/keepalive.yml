name: Keep Streamlit Apps Alive

on:
  schedule:
    - cron: "*/20 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Ping App 1
        run: |
          curl -L \
            -A "Mozilla/5.0" \
            https://appels-d-offres-dashbord.streamlit.app/

      - name: Ping App 2
        run: |
          curl -L \
            -A "Mozilla/5.0" \
            https://appels-d-offres.streamlit.app/
