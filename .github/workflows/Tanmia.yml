name: Run Tanmia Scraper
on:
  workflow_dispatch:
  schedule:
    - cron: '0 5 * * *'
jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr libtesseract-dev poppler-utils \
            tesseract-ocr-fra tesseract-ocr-ara tesseract-ocr-eng

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install pandas requests pymupdf pytesseract pillow \
            python-docx PyPDF2 beautifulsoup4

      - name: Run Tanmia Scraper
        run: python Tanmia.py

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: tanmia-scraper-results
          path: results.csv

      - name: Commit and Push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add results.csv
          git commit -m "📊 Daily Tanmia Scrape: $(date +'%Y-%m-%d')" || echo "No changes"
          git push
