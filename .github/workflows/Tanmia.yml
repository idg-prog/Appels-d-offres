name: Run Tanmia Scraper with local Ollama

on:
  workflow_dispatch:
  schedule:
    - cron: '0 5 * * *'

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # --- NEW: Install Ollama ---
      - name: Install Ollama
        run: |
          curl -fsSL https://ollama.com/install.sh | sh

      # --- NEW: Start Ollama & Pull Model ---
      # We run 'serve' in the background and wait a few seconds for it to wake up
      - name: Start Ollama Server
        run: |
          ollama serve > ollama.log 2>&1 &
          sleep 5
          ollama pull llama3.2

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr libtesseract-dev poppler-utils
          sudo apt-get install -y tesseract-ocr-fra tesseract-ocr-ara tesseract-ocr-eng

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Tanmia Scraper
        run: python Tanmia.py
        # No more N8N_WEBHOOK_URL needed unless you still want to send results there

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: tanmia-scraper-results
          path: results.csv
