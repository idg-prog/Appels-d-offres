name: Run Tanmia Scraper
on:
  workflow_dispatch:
  schedule:
    # Runs at 05:00 UTC every day
    - cron: '0 1 * * *'

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 60 

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr \
            tesseract-ocr-fra tesseract-ocr-ara tesseract-ocr-eng

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          # Added supabase to your install list
          pip install pandas requests pymupdf pytesseract pillow python-docx beautifulsoup4 supabase

      - name: Run Tanmia Scraper
        env:
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        run: python Tanmia.py
